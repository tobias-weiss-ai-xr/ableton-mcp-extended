<!DOCTYPE html>
<html>
<head>
    <title>VST Live Analysis - Real-Time Performance Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a1a; 
            color: #00ff88; 
            font-family: 'Consolas', monospace; 
            padding: 20px;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        h1 { 
            color: #00ff88; 
            margin-bottom: 20px; 
            font-size: 24px;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 10px;
        }
        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: #2a2a2a;
            border: 1px solid #00ff88;
            border-radius: 5px;
            padding: 15px;
            flex: 1;
        }
        .card-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .data-value {
            font-size: 32px;
            font-weight: bold;
        }
        .data-sub {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .bar-container {
            background: #3a3a3a;
            height: 20px;
            border-radius: 3px;
            overflow: hidden;
            margin: 5px 0;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc66);
            transition: width 0.1s;
        }
        .track-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .track-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .track-name {
            font-size: 12px;
            color: #aaa;
        }
        .send-levels {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .send-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .send-label {
            width: 60px;
            font-size: 12px;
        }
        .status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .status.playing {
            background: #00ff88;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% { opacity: 0.5; }
        }
        .time-info {
            font-size: 18px;
        }
        .timestamp {
            font-size: 10px;
            color: #666;
            margin-top: 20px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎛️ VST Live Analysis Monitor</h1>
        
        <div class="row">
            <div class="card">
                <div class="card-title">Status</div>
                <div class="data-value">
                    <span class="status playing" id="status"></span>
                    <span id="playing-text">LIVE</span>
                </div>
                <div class="data-sub">Real-time streaming</div>
            </div>
            
            <div class="card">
                <div class="card-title">Time Position</div>
                <div class="data-value" id="position">7462:4</div>
                <div class="data-sub" id="time-display">Bar : Beat</div>
            </div>
            
            <div class="card">
                <div class="card-title">Tempo & Meter</div>
                <div class="data-value"><span id="bpm">110.0</span> <span style="font-size:16px">BPM</span></div>
                <div class="data-sub" id="meter">4/4</div>
            </div>
        </div>
        
        <div class="row">
            <div class="card">
                <div class="card-title">Master Volume</div>
                <div class="bar-container">
                    <div class="bar-fill" id="master-bar" style="width: 0%"></div>
                </div>
                <div class="data-value" id="master-vol">93%</div>
            </div>
            
            <div class="card">
                <div class="card-title">Reverb Send</div>
                <div class="send-levels">
                    <div class="send-item">
                        <span class="send-label">REVERB</span>
                        <div class="bar-container">
                            <div class="bar-fill" id="reverb-bar" style="width: 80%"></div>
                        </div>
                    </div>
                    <div class="send-item">
                        <span class="send-label">DELAY</span>
                        <div class="bar-container">
                            <div class="bar-fill" id="delay-bar" style="width: 80%"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">Active Clips</div>
                <div class="data-value" id="clips-count">9</div>
                <div class="data-sub">Tracks playing</div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">Per-Track Volume Levels</div>
            <div class="track-grid" id="track-grid">
                <!-- Track levels will be populated dynamically -->
            </div>
        </div>
        
        <div class="timestamp">
            Updated: <span id="last-update">--:--:--</span> | Connection: MCP UDP → VST Stream
        </div>
    </div>
    
    <script>
        // WebSocket/UDP-like simulation for demo
        // In production, this would use WebSocket or native TCP to receive analysis data
        
        const tracks = [
            { name: 'Drums', index: 2 },
            { name: 'Bass', index: 3 },
            { name: 'Chords', index: 4 },
            { name: 'Tuba', index: 5 },
            { name: 'Lead', index: 6 },
            { name: 'Pad', index: 7 },
            { name: 'Strings', index: 8 },
            { name: 'FX', index: 9 },
            { name: 'Percussion', index: 10 }
        ];
        
        // Initialize track grid
        const trackGrid = document.getElementById('track-grid');
        tracks.forEach(track => {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `
                <span class="track-name">${track.name}</span>
                <div class="bar-container">
                    <div class="bar-fill" id="vol-${track.index}" style="width: 75%"></div>
                </div>
            `;
            trackGrid.appendChild(div);
        });
        
        // Simulate real-time updates (replace with actual WebSocket/TCP connection)
        function updateAnalysis() {
            // Get current time
            const now = new Date();
            document.getElementById('last-update').textContent = now.toLocaleTimeString();
            
            // In production, fetch from WebSocket:
            // fetch('/api/analysis')
            //   .then(res => res.json())
            //   .then(data => {
            //       updateUI(data);
            //   });
            
            console.log('Analysis update...');
        }
        
        // Update every 100ms
        setInterval(updateAnalysis, 100);
        
        console.log('VST Live Analysis Display initialized');
        console.log('Waiting for WebSocket connection on ws://localhost:8080/analysis');
    </script>
</body>
</html>
